<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Value Add VC - Cheering From the Sidelines | Trace Cohen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #4f46e5;
            --accent-light: #6366f1;
            --text: #374151;
            --text-light: #6b7280;
            --bg: #ffffff;
            --bg-alt: #f9fafb;
            --border: #e5e7eb;
            --code-bg: #1e1e2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.7;
            font-size: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Cover Page */
        .cover {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, #16213e 100%);
            color: white;
            padding: 4rem 2rem;
        }

        .cover h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .cover h2 {
            font-size: 1.5rem;
            font-weight: 400;
            opacity: 0.9;
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .cover .author {
            font-size: 1.25rem;
            opacity: 0.8;
            margin-top: 2rem;
        }

        .cover .tagline {
            font-size: 1rem;
            opacity: 0.7;
            margin-top: 1rem;
            font-style: italic;
        }

        /* Navigation */
        .toc {
            background: var(--bg-alt);
            padding: 3rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .toc h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .toc-list {
            column-count: 2;
            column-gap: 3rem;
            list-style: none;
        }

        .toc-list li {
            margin-bottom: 0.5rem;
            break-inside: avoid;
        }

        .toc-list a {
            color: var(--text);
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
            border-bottom: 1px dotted var(--border);
        }

        .toc-list a:hover {
            color: var(--accent);
        }

        /* Content */
        .content {
            padding: 3rem 0;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin: 3rem 0 1.5rem;
            padding-top: 2rem;
            border-top: 3px solid var(--accent);
        }

        h2 {
            font-size: 1.75rem;
            color: var(--primary);
            margin: 2.5rem 0 1rem;
        }

        h3 {
            font-size: 1.25rem;
            color: var(--accent);
            margin: 2rem 0 0.75rem;
        }

        p {
            margin-bottom: 1rem;
        }

        ul, ol {
            margin: 1rem 0 1rem 1.5rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: var(--text-light);
        }

        strong {
            font-weight: 600;
            color: var(--primary);
        }

        /* Code blocks - the charts */
        pre {
            background: var(--code-bg);
            color: #cdd6f4;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-alt);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre code {
            background: none;
            padding: 0;
        }

        /* Horizontal rules */
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 3rem 0;
        }

        /* Part headers */
        .part-header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            padding: 4rem 2rem;
            text-align: center;
            margin: 4rem -2rem;
        }

        .part-header h1 {
            border: none;
            color: white;
            margin: 0;
            padding: 0;
        }

        /* Print styles */
        @media print {
            .cover {
                page-break-after: always;
            }

            h1 {
                page-break-before: always;
            }

            pre {
                white-space: pre-wrap;
                word-wrap: break-word;
            }

            .no-print {
                display: none;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cover h1 {
                font-size: 2.5rem;
            }

            .cover h2 {
                font-size: 1.25rem;
            }

            .toc-list {
                column-count: 1;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            pre {
                font-size: 0.75rem;
            }
        }

        /* Download button */
        .download-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
            transition: all 0.2s;
            z-index: 100;
        }

        .download-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        @media print {
            .download-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="cover">
        <h1>THE VALUE ADD VC</h1>
        <h2>Cheering From the Sidelines: A Practical Guide to Venture Capital in the AI Era</h2>
        <div class="author">By Trace Cohen</div>
        <div class="tagline">Actionable insights for founders, investors, and operators</div>
    </div>

    <a href="#" class="download-btn no-print" onclick="window.print(); return false;">
        Print / Save PDF
    </a>

    <div class="container">
        <div id="content" class="content">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Fetch and render the markdown content
        fetch('content.md')
            .then(response => response.text())
            .then(markdown => {
                // Remove the title lines since we have the cover
                const lines = markdown.split('\n');
                let startIndex = 0;
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('# ABOUT THE AUTHOR')) {
                        startIndex = i;
                        break;
                    }
                }
                const cleanedMarkdown = lines.slice(startIndex).join('\n');

                // Configure marked
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });

                document.getElementById('content').innerHTML = marked.parse(cleanedMarkdown);
            })
            .catch(error => {
                console.error('Error loading content:', error);
                document.getElementById('content').innerHTML = '<p>Error loading content. Please refresh the page.</p>';
            });
    </script>
</body>
</html>
