<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="coverBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2744"/>
      <stop offset="50%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <linearGradient id="iconGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="iconGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="iconGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#coverBg)"/>

  <!-- Subtle radial glow -->
  <ellipse cx="200" cy="280" rx="180" ry="180" fill="rgba(59,130,246,0.08)"/>

  <!-- Top icons row -->
  <!-- Lightbulb icon -->
  <g transform="translate(85, 100)">
    <circle cx="20" cy="20" r="24" fill="rgba(255,255,255,0.1)"/>
    <circle cx="20" cy="16" r="10" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <rect x="15" y="26" width="10" height="6" rx="2" fill="#fbbf24"/>
    <line x1="20" y1="6" x2="20" y2="2" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="7" y2="7" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="30" y1="10" x2="33" y2="7" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Chart icon -->
  <g transform="translate(200, 85)">
    <circle cx="0" cy="20" r="26" fill="rgba(255,255,255,0.1)"/>
    <rect x="-15" y="18" width="6" height="14" rx="1" fill="#22d3ee"/>
    <rect x="-6" y="10" width="6" height="22" rx="1" fill="#3b82f6"/>
    <rect x="3" y="14" width="6" height="18" rx="1" fill="#10b981"/>
    <polyline points="-12,12 -3,6 6,10 12,2" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Target icon -->
  <g transform="translate(295, 100)">
    <circle cx="20" cy="20" r="24" fill="rgba(255,255,255,0.1)"/>
    <circle cx="20" cy="20" r="14" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <circle cx="20" cy="20" r="8" fill="none" stroke="#f97316" stroke-width="2"/>
    <circle cx="20" cy="20" r="3" fill="#fbbf24"/>
  </g>

  <!-- Left side icons -->
  <!-- Gear icon -->
  <g transform="translate(50, 200)">
    <circle cx="20" cy="20" r="24" fill="rgba(255,255,255,0.1)"/>
    <circle cx="20" cy="20" r="8" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <circle cx="20" cy="20" r="3" fill="#94a3b8"/>
    <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round">
      <line x1="20" y1="6" x2="20" y2="10"/>
      <line x1="20" y1="30" x2="20" y2="34"/>
      <line x1="6" y1="20" x2="10" y2="20"/>
      <line x1="30" y1="20" x2="34" y2="20"/>
    </g>
  </g>

  <!-- Dollar icon -->
  <g transform="translate(50, 310)">
    <circle cx="20" cy="20" r="24" fill="rgba(255,255,255,0.1)"/>
    <circle cx="20" cy="20" r="14" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981" text-anchor="middle">$</text>
  </g>

  <!-- Right side icons -->
  <!-- Document icon -->
  <g transform="translate(330, 200)">
    <circle cx="20" cy="20" r="24" fill="rgba(255,255,255,0.1)"/>
    <rect x="10" y="8" width="20" height="26" rx="2" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <line x1="14" y1="16" x2="26" y2="16" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="22" x2="26" y2="22" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="28" x2="22" y2="28" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Rocket icon -->
  <g transform="translate(330, 310)">
    <circle cx="20" cy="20" r="24" fill="rgba(255,255,255,0.1)"/>
    <path d="M20 8 L26 20 L23 20 L23 28 L17 28 L17 20 L14 20 Z" fill="#a855f7"/>
    <circle cx="20" cy="17" r="2" fill="white"/>
    <path d="M14 26 L10 32 L16 28" fill="#f97316"/>
    <path d="M26 26 L30 32 L24 28" fill="#f97316"/>
  </g>

  <!-- Title Section -->
  <text x="200" y="260" font-family="Georgia, serif" font-size="22" font-style="italic" fill="rgba(255,255,255,0.7)" text-anchor="middle">The</text>

  <text x="200" y="300" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1">Value Add</text>

  <text x="200" y="350" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" fill="#22d3ee" text-anchor="middle" letter-spacing="1">VC Handbook</text>

  <!-- Bottom icons row -->
  <!-- Calendar icon -->
  <g transform="translate(85, 400)">
    <circle cx="20" cy="20" r="24" fill="rgba(255,255,255,0.1)"/>
    <rect x="8" y="10" width="24" height="22" rx="3" fill="none" stroke="#ec4899" stroke-width="2"/>
    <line x1="8" y1="18" x2="32" y2="18" stroke="#ec4899" stroke-width="2"/>
    <line x1="14" y1="6" x2="14" y2="12" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>
    <line x1="26" y1="6" x2="26" y2="12" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>
    <circle cx="15" cy="24" r="2" fill="#ec4899"/>
    <circle cx="25" cy="24" r="2" fill="#ec4899"/>
  </g>

  <!-- Handshake/People icon -->
  <g transform="translate(200, 415)">
    <circle cx="0" cy="20" r="26" fill="rgba(255,255,255,0.1)"/>
    <circle cx="-8" cy="14" r="5" fill="#60a5fa"/>
    <circle cx="8" cy="14" r="5" fill="#22d3ee"/>
    <path d="M-18 32 Q-8 24 0 28 Q8 24 18 32" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Pie chart icon -->
  <g transform="translate(295, 400)">
    <circle cx="20" cy="20" r="24" fill="rgba(255,255,255,0.1)"/>
    <circle cx="20" cy="20" r="12" fill="none" stroke="#f97316" stroke-width="2"/>
    <path d="M20 20 L20 8 A12 12 0 0 1 30.4 14.4 Z" fill="#22d3ee"/>
    <path d="M20 20 L30.4 14.4 A12 12 0 0 1 26 30 Z" fill="#10b981"/>
    <path d="M20 20 L26 30 A12 12 0 0 1 20 32 Z" fill="#f97316"/>
  </g>

  <!-- Subtitle -->
  <text x="200" y="490" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="0.5">Master Data-Driven Investing</text>
  <text x="200" y="508" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="0.5">& Value Creation</text>

  <!-- Author -->
  <text x="200" y="540" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="2">TRACE COHEN</text>

  <!-- Spine effect -->
  <rect x="0" y="0" width="12" height="560" fill="rgba(0,0,0,0.3)"/>
  <rect x="12" y="0" width="1" height="560" fill="rgba(255,255,255,0.1)"/>
</svg>
