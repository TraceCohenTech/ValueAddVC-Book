<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Value Add VC - Cheering From the Sidelines | Trace Cohen</title>
    <meta name="description" content="A Practical Guide to Venture Capital in the AI Era by Trace Cohen. Actionable insights for founders, investors, and operators.">
    <meta name="author" content="Trace Cohen">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #4f46e5;
            --accent-light: #6366f1;
            --text: #374151;
            --text-light: #6b7280;
            --bg: #ffffff;
            --bg-alt: #f9fafb;
            --border: #e5e7eb;
            --code-bg: #1e1e2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.7;
            font-size: 17px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Cover Page */
        .cover {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, #16213e 100%);
            color: white;
            padding: 4rem 2rem;
        }

        .cover h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .cover h2 {
            font-size: 1.5rem;
            font-weight: 400;
            opacity: 0.9;
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .cover .author {
            font-size: 1.25rem;
            opacity: 0.8;
            margin-top: 2rem;
        }

        .cover .tagline {
            font-size: 1rem;
            opacity: 0.7;
            margin-top: 1rem;
            font-style: italic;
        }

        /* Content */
        .content {
            padding: 3rem 0;
        }

        .content h1 {
            font-size: 2.25rem;
            color: var(--primary);
            margin: 3rem 0 1.5rem;
            padding-top: 2rem;
            border-top: 3px solid var(--accent);
        }

        .content h1:first-child {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        .content h2 {
            font-size: 1.6rem;
            color: var(--primary);
            margin: 2.5rem 0 1rem;
        }

        .content h3 {
            font-size: 1.2rem;
            color: var(--accent);
            margin: 2rem 0 0.75rem;
        }

        .content p {
            margin-bottom: 1rem;
        }

        .content ul, .content ol {
            margin: 1rem 0 1rem 1.5rem;
        }

        .content li {
            margin-bottom: 0.5rem;
        }

        .content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: var(--text-light);
        }

        .content strong {
            font-weight: 600;
            color: var(--primary);
        }

        /* Code blocks - the charts */
        .content pre {
            background: var(--code-bg);
            color: #cdd6f4;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1.5rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        .content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-alt);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .content pre code {
            background: none;
            padding: 0;
        }

        /* Horizontal rules */
        .content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 3rem 0;
        }

        /* Print styles */
        @media print {
            .cover {
                min-height: auto;
                padding: 3rem 2rem;
                page-break-after: always;
            }

            .cover h1 {
                font-size: 2.5rem;
            }

            .content h1 {
                page-break-before: always;
            }

            .content pre {
                white-space: pre-wrap;
                word-wrap: break-word;
                font-size: 0.7rem;
                background: #f0f0f0;
                color: #333;
                border: 1px solid #ccc;
            }

            .no-print {
                display: none !important;
            }

            body {
                font-size: 11pt;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cover h1 {
                font-size: 2.5rem;
            }

            .cover h2 {
                font-size: 1.25rem;
            }

            .content h1 {
                font-size: 1.75rem;
            }

            .content h2 {
                font-size: 1.4rem;
            }

            .content pre {
                font-size: 0.7rem;
                padding: 1rem;
            }
        }

        /* Action buttons */
        .actions {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 100;
        }

        .action-btn {
            background: var(--accent);
            color: white;
            padding: 0.875rem 1.25rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
        }

        .action-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .action-btn.secondary {
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(26, 26, 46, 0.3);
        }

        .action-btn.secondary:hover {
            background: #2a2a4e;
        }

        @media print {
            .actions {
                display: none;
            }
        }

        /* Back to top */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            background: var(--bg);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .back-to-top:hover {
            background: var(--bg-alt);
        }

        @media print {
            .back-to-top {
                display: none;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--bg-alt);
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }

        .footer p {
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="cover" id="top">
        <h1>THE VALUE ADD VC</h1>
        <h2>Cheering From the Sidelines: A Practical Guide to Venture Capital in the AI Era</h2>
        <div class="author">By Trace Cohen</div>
        <div class="tagline">Actionable insights for founders, investors, and operators</div>
    </div>

    <div class="actions no-print">
        <button class="action-btn" onclick="window.print()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
                <rect x="6" y="14" width="12" height="8"/>
            </svg>
            Print / PDF
        </button>
    </div>

    <a href="#top" class="back-to-top no-print">Back to Top</a>

    <div class="container">
        <div class="content">
            <!-- CONTENT_PLACEHOLDER -->
        </div>
    </div>

    <div class="footer no-print">
        <p><strong>The Value Add VC</strong> by Trace Cohen</p>
        <p>
            Newsletter: <a href="https://startupstechvc.beehiiv.com" target="_blank">startupstechvc.beehiiv.com</a> |
            Resources: <a href="https://valueaddvc.com" target="_blank">valueaddvc.com</a>
        </p>
    </div>
</body>
</html>
